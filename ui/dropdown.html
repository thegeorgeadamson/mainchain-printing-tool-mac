<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      background: #1e1e1e;
      color: #e0e0e0;
      border-radius: 10px;
      overflow: hidden;
      user-select: none;
    }
    .header {
      padding: 14px 16px 10px;
      border-bottom: 1px solid #333;
    }
    .header h1 {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
    }
    .header .subtitle {
      font-size: 11px;
      color: #888;
      margin-top: 2px;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 6px;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #34c759;
    }
    .status-text { font-size: 12px; color: #aaa; }
    .section {
      padding: 10px 16px;
      border-bottom: 1px solid #333;
    }
    .section-title {
      font-size: 11px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    .printer-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
    }
    .printer-icon { font-size: 14px; }
    .printer-name { font-size: 13px; }
    .printer-default {
      font-size: 10px;
      color: #888;
      background: #333;
      padding: 1px 6px;
      border-radius: 4px;
      margin-left: auto;
    }
    .job-item {
      display: flex;
      justify-content: space-between;
      padding: 3px 0;
      font-size: 12px;
    }
    .job-name { color: #ccc; }
    .job-time { color: #666; font-size: 11px; }
    .job-status {
      font-size: 10px;
      padding: 1px 5px;
      border-radius: 3px;
    }
    .job-status.sent { background: #1a3a1a; color: #34c759; }
    .job-status.sending { background: #3a3a1a; color: #ffd60a; }
    .job-status.failed { background: #3a1a1a; color: #ff453a; }
    .empty { color: #666; font-style: italic; font-size: 12px; }
    .footer {
      padding: 10px 16px;
      display: flex;
      justify-content: space-between;
    }
    .footer button {
      background: none;
      border: 1px solid #444;
      color: #aaa;
      padding: 5px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
    }
    .footer button:hover { background: #333; color: #fff; }
    .footer button.quit { border-color: #553; color: #c44; }
    .footer button.quit:hover { background: #331a1a; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Mainchain Printing Tool</h1>
    <div class="subtitle">macOS Edition</div>
    <div class="status">
      <div class="status-dot"></div>
      <div class="status-text" id="status-text">Running on port 50515</div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Printers</div>
    <div id="printers"></div>
  </div>

  <div class="section">
    <div class="section-title">Recent Print Jobs</div>
    <div id="jobs"></div>
  </div>

  <div class="footer">
    <button onclick="openFreman()">Open Freman</button>
    <button class="quit" onclick="quit()">Quit</button>
  </div>

  <script>
    let mptApi;
    try { mptApi = require('@electron/remote').getGlobal('mptApi'); } catch {}

    function refresh() {
      fetch('http://localhost:50515/api/status')
        .then(r => r.json())
        .then(data => {
          document.getElementById('status-text').textContent =
            `Running on port ${data.port} - ${data.connections} connection(s)`;

          const printersEl = document.getElementById('printers');
          if (data.printers.length === 0) {
            printersEl.innerHTML = '<div class="empty">No printers found</div>';
          } else {
            printersEl.innerHTML = data.printers.map(p => `
              <div class="printer-item">
                <span class="printer-icon">&#x1F5A8;</span>
                <span class="printer-name">${p.Name}</span>
                ${p.IsDefault ? '<span class="printer-default">Default</span>' : ''}
              </div>
            `).join('');
          }

          const jobsEl = document.getElementById('jobs');
          const jobs = (data.printHistory || []).slice(-5).reverse();
          if (jobs.length === 0) {
            jobsEl.innerHTML = '<div class="empty">No recent jobs</div>';
          } else {
            jobsEl.innerHTML = jobs.map(j => `
              <div class="job-item">
                <span class="job-name">${j.filename}</span>
                <span class="job-status ${j.status}">${j.status}</span>
              </div>
            `).join('');
          }
        })
        .catch(() => {
          document.getElementById('status-text').textContent = 'Server not responding';
        });
    }

    function openFreman() {
      if (mptApi) mptApi.openExternal('https://fremanspanz-mchaincfa.mainchain.net');
      else window.open('https://fremanspanz-mchaincfa.mainchain.net');
    }

    function quit() {
      if (mptApi) mptApi.quit();
    }

    refresh();
    setInterval(refresh, 3000);
  </script>
</body>
</html>
